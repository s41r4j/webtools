<section class="onlyyes-layout">
    <article class="paper-panel consent-card">
        <p class="panel-kicker">Consent Machine</p>
        <h3 class="panel-title">Only Yes</h3>

        <div class="question-container">
            <span id="question" class="question-text" readonly></span>
        </div>

        <div class="options-container">
            <button id="yes" type="button" class="option-btn" onclick="submitAnswer()">Yes</button>
            <button id="no" type="button" class="option-btn">No</button>
        </div>
    </article>

    <aside class="paper-panel instruction-card">
        <p class="panel-kicker">Margin Notes</p>
        <h3 class="panel-title">Prompt controls</h3>
        <div class="footer" id="footer"></div>
    </aside>
</section>
