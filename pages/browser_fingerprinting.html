<section class="tool-layout">
    <section>
        <p class="panel-kicker">Inspection Notes</p>
        <h3 class="panel-title">Read the browser as a document.</h3>
        <p class="panel-copy">This worksheet collects local browser, device, and network signals into one printable table. It is meant for inspection and comparison rather than storage.</p>

        <div class="note-grid">
            <div>
                <span>Scope</span>
                <strong>Browser, device, network</strong>
            </div>
            <div>
                <span>Collection</span>
                <strong>Computed locally</strong>
            </div>
            <div>
                <span>Export</span>
                <strong>Print or save to PDF</strong>
            </div>
        </div>

        <div class="inline-actions">
            <button id="printButton" class="tool-button tool-button--primary">Print / Save PDF</button>
        </div>
    </section>
</section>

<div class="fingerprint-sheet" id="fingerprintingContainer"></div>
<div id="hardwareInfo"></div>
